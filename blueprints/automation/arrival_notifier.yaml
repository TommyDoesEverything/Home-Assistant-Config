blueprint:
  name: "Arrival Notifier with Short-Stay Cleanup"
  description: "Turns a light a specific color on arrival. If you leave while it's still that color, it turns off."
  domain: automation
  input:
    target_person:
      name: Person
      description: The person to track.
      selector:
        entity:
          domain: person
    target_light:
      name: Light
      description: The light to turn on.
      selector:
        target:
          entity:
            domain: light
    arrival_color:
      name: Arrival Color
      description: The color the light should turn when the tracked person arrives.
      default: [0, 110, 255]
      selector:
        color_rgb: {}
    arrival_helper:
      name: Arrival Helper
      description: A Toggle (Input Boolean) to track this specific person's arrival state.
      selector:
        entity:
          domain: input_boolean
    sensitivity:
      name: Color Matching Sensitivity
      description: "How 'fuzzy' the color check is. 10-15 is a good balance for high precision."
      default: 10
      selector:
        number:
          min: 5
          max: 100
          mode: slider

mode: restart

trigger:
  - trigger: state
    entity_id: !input target_person
    from: "not_home"
    to: "home"
    id: "arriving"
  - trigger: state
    entity_id: !input target_person
    from: "home"
    to: "not_home"
    id: "leaving"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "arriving"
        sequence:
          - action: light.turn_on
            target: !input target_light
            data:
              brightness_pct: 100
              rgb_color: !input arrival_color
          - action: input_boolean.turn_on
            target:
              entity_id: !input arrival_helper
      - conditions:
          - condition: trigger
            id: "leaving"
          - condition: state
            entity_id: !input arrival_helper
            state: "on"
          - condition: template
            value_template: >
              {# We pull the entity_id from the target input to find the actual bulb #}
              {% set light_entity = (!input target_light).entity_id %}
              {% set current = state_attr(light_entity, 'rgb_color') %}
              {% set chosen = !input arrival_color %}
              {% set tol = !input sensitivity %}

              {% if current is not none and current | length == 3 %}
                {# New Logic: Every channel must be within the sensitivity limit #}
                {% set r_diff = (current[0] - chosen[0]) | abs %}
                {% set g_diff = (current[1] - chosen[1]) | abs %}
                {% set b_diff = (current[2] - chosen[2]) | abs %}
                
                {{ r_diff < tol and g_diff < tol and b_diff < tol }}
              {% else %}
                false
              {% endif %}
        sequence:
          - action: light.turn_off
            target: !input target_light
            data:
              transition: 5
          - action: input_boolean.turn_off
            target:
              entity_id: !input arrival_helper
