blueprint:
  name: "Arrival Notifier with Short-Stay Cleanup (Precision Edition)"
  description: "Turns a light a specific color on arrival. If you leave while it's still that color, it turns off."
  domain: automation
  input:
    target_person:
      name: Person
      selector:
        entity:
          domain: person
    target_light:
      name: Light
      selector:
        entity:
          domain: light
    arrival_color:
      name: Arrival Color
      default: [0, 110, 255]
      selector:
        color_rgb: {}
    arrival_helper:
      name: Arrival Helper
      selector:
        entity:
          domain: input_boolean
    sensitivity:
      name: Color Matching Tolerance
      description: "Maximum allowed difference per channel (R, G, and B). 10-15 is recommended for high precision."
      default: 10
      selector:
        number:
          min: 1
          max: 50
          mode: slider

mode: restart

trigger:
  - trigger: state
    entity_id: !input target_person
    from: "not_home"
    to: "home"
    id: "arriving"
  - trigger: state
    entity_id: !input target_person
    from: "home"
    to: "not_home"
    id: "leaving"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "arriving"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input target_light
            data:
              brightness_pct: 100
              rgb_color: !input arrival_color
          - action: input_boolean.turn_on
            target:
              entity_id: !input arrival_helper
      - conditions:
          - condition: trigger
            id: "leaving"
          - condition: state
            entity_id: !input arrival_helper
            state: "on"
          - condition: template
            value_template: >
              {% set current = state_attr(!input target_light, 'rgb_color') %}
              {% set chosen = !input arrival_color %}
              {% set tol = !input sensitivity %}
              {% if current is not none and current | length == 3 %}
                {% set r_diff = (current[0] - chosen[0]) | abs %}
                {% set g_diff = (current[1] - chosen[1]) | abs %}
                {% set b_diff = (current[2] - chosen[2]) | abs %}
                {{ r_diff < tol and g_diff < tol and b_diff < tol }}
              {% else %}
                false
              {% endif %}
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input target_light
            data:
              transition: 5
          - action: input_boolean.turn_off
            target:
              entity_id: !input arrival_helper
