blueprint:
  name: "Arrival Notifier with Short-Stay Cleanup"
  description: "Turns a light a specific color on arrival. If you leave while it's still that color, it turns off."
  domain: automation
  input:
    target_person:
      name: Person
      description: The person to track.
      selector:
        entity:
          domain: person
    target_light:
      name: Light
      description: The light to turn on.
      selector:
        target:
          entity:
            domain: light
    arrival_color:
      name: Arrival Color
      description: >
        PICKING TIP: Set your light to the color you want in the dashboard FIRST. 
        Then, check the 'rgb_color' attribute in Developer Tools > States. 
        Enter those exact numbers here for 100% reliability.
      default: [62, 109, 255]
      selector:
        color_rgb: {}
    arrival_helper:
      name: Arrival Helper
      description: A Toggle (Input Boolean) to track this specific person's arrival state.
      selector:
        entity:
          domain: input_boolean
    sensitivity:
      name: Color Matching Sensitivity
      description: "How 'fuzzy' the color check is. 10-15 is a good balance for high precision."
      default: 10
      selector:
        number:
          min: 5
          max: 100
          mode: slider

mode: restart

trigger:
  - trigger: state
    entity_id: !input target_person
    from: "not_home"
    to: "home"
    id: "arriving"
  - trigger: state
    entity_id: !input target_person
    from: "home"
    to: "not_home"
    id: "leaving"

action:
  - variables:
      target_light_var: !input target_light
      light_entity: "{{ target_light_var.entity_id }}"
      arrival_color_var: !input arrival_color
      sensitivity_var: !input sensitivity
      helper_entity: !input arrival_helper
  - choose:
      - conditions:
          - condition: trigger
            id: "arriving"
        sequence:
          - action: light.turn_on
            target: !input target_light
            data:
              brightness_pct: 100
              rgb_color: !input arrival_color
          - action: input_boolean.turn_on
            target:
              entity_id: !input arrival_helper
      - conditions:
          - condition: trigger
            id: "leaving"
          - condition: state
            entity_id: !input arrival_helper
            state: "on"
          - condition: template
            value_template: >
              {% set current = state_attr(light_entity, 'rgb_color') %}
              {% set chosen = arrival_color_var %}
              {% set tol = sensitivity_var %}
              {% if current is not none and current | length == 3 %}
                {% set distance = ((current[0]-chosen[0])**2 + (current[1]-chosen[1])**2 + (current[2]-chosen[2])**2)**0.5 %}
                {{ distance < tol }}
              {% else %}
                false
              {% endif %}
        sequence:
          - action: light.turn_off
            target:
              entity_id: "{{ light_entity }}"
            data:
              transition: 5
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ helper_entity }}"
